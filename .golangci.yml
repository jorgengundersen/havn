version: "2"

formatters:
  enable:
    - gci

  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/jorgengundersen/havn)
      custom-order: true

linters:
  enable:
    # Correctness (gosimple is included in staticcheck in v2)
    - govet
    - errcheck
    - staticcheck
    - unused

    # Consistency
    - revive

    # Logging (code-standards.md §5)
    - sloglint

  disable-all: true

linters-settings:
  sloglint:
    no-mixed-args: true
    attr-only: true
    no-global: "all"
    static-msg: true
    key-naming-case: "snake"

  revive:
    rules:
      - name: blank-imports
      - name: exported
      - name: unexported-return
      - name: unused-parameter
      - name: var-naming
      - name: error-return
      - name: error-naming
      - name: receiver-naming
      - name: indent-error-flow
