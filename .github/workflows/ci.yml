name: ci

on:
  push:
  pull_request:

jobs:
  quality-gates:
    name: quality-gates
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup-go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: run-core-quality-gates
        run: make check

  integration-tests:
    name: integration-tests
    runs-on: ubuntu-latest
    needs: quality-gates
    steps:
      - name: checkout
        uses: actions/checkout@v5

      - name: setup-go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: run-integration-tests
        run: make test-integration
