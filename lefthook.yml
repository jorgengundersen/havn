# https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  jobs:
    - name: fmt
      glob: "*.go"
      run: gofmt -l . | grep . && echo "gofmt failed — run 'make fmt'" && exit 1 || true
    - name: lint
      glob: "*.go"
      run: go tool golangci-lint run
    - name: test
      glob: "*.go"
      run: go test ./...
    - name: build
      glob: "*.go"
      run: go build -o /dev/null ./cmd/havn
