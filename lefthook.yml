# https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  jobs:
    - name: fmt
      glob: "*.go"
      run: make fmt-check
    - name: lint
      glob: "*.go"
      run: make lint
    - name: test
      glob: "*.go"
      run: go test ./...
    - name: test-contract-matrix
      glob: "*.go"
      run: make test-contract-matrix
    - name: build
      glob: "*.go"
      run: go build -o /dev/null ./cmd/havn
