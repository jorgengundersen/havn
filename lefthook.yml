# https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  jobs:
    - name: fmt
      glob: "*.go"
      run: make fmt-check
    - name: lint
      glob: "*.go"
      run: go tool golangci-lint run
    - name: test
      glob: "*.go"
      run: go test ./...
    - name: build
      glob: "*.go"
      run: go build -o /dev/null ./cmd/havn
